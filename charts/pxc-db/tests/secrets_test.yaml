suite: pxc-db secrets
release:
  name: unit
  namespace: test-ns
tests:
  - it: does not render a database password secret by default
    template: templates/cluster-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the database password secret when credentials are provided
    template: templates/cluster-secret.yaml
    set:
      secrets.passwords.root: root
      secrets.passwords.xtrabackup: xbackup
      secrets.passwords.monitor: monitor
      secrets.passwords.proxyadmin: proxyadmin
      secrets.passwords.operator: operator
      secrets.passwords.replication: repl
      secrets.passwords.pmmservertoken: token
    asserts:
      - equal:
          path: metadata
          value:
            name: unit-pxc-db-secrets
            namespace: test-ns
            labels:
              app.kubernetes.io/name: pxc-db
              helm.sh/chart: pxc-db-1.20.0
              app.kubernetes.io/instance: unit
              app.kubernetes.io/version: "1.20.0"
              app.kubernetes.io/managed-by: Helm
        documentIndex: 0
      - equal:
          path: data
          value:
            root: cm9vdA==
            xtrabackup: eGJhY2t1cA==
            monitor: bW9uaXRvcg==
            proxyadmin: cHJveHlhZG1pbg==
            pmmservertoken: dG9rZW4=
            operator: b3BlcmF0b3I=
            replication: cmVwbA==
        documentIndex: 0

  - it: renders generated tls secrets by default
    template: templates/cluster-ssl-secret.yaml
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: unit-pxc-db-ssl
        documentIndex: 0
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 0
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: unit-pxc-db-ssl-internal
        documentIndex: 1

  - it: skips generated tls secrets when cert-manager integration is enabled
    template: templates/cluster-ssl-secret.yaml
    set:
      pxc.certManager: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders s3 credentials secret
    template: templates/s3-secret.yaml
    set:
      backup.storages.backup1.type: s3
      backup.storages.backup1.s3.bucket: backups
      backup.storages.backup1.s3.region: us-east-1
      backup.storages.backup1.s3.credentialsAccessKey: some-access-key
      backup.storages.backup1.s3.credentialsSecretKey: some-secret-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: unit-pxc-db-s3-backup1
        documentIndex: 0
      - equal:
          path: data
          value:
            AWS_ACCESS_KEY_ID: c29tZS1hY2Nlc3Mta2V5
            AWS_SECRET_ACCESS_KEY: c29tZS1zZWNyZXQta2V5
        documentIndex: 0
