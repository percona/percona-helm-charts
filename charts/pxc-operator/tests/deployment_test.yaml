suite: pxc-operator deployment
templates:
  - templates/deployment.yaml
release:
  name: unit
  namespace: test-ns
tests:
  - it: renders the default operator deployment
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: unit-pxc-operator
      - equal:
          path: metadata.namespace
          value: test-ns
      - isSubset:
          path: metadata.labels
          content:
              app.kubernetes.io/name: pxc-operator
              app.kubernetes.io/instance: unit
              app.kubernetes.io/managed-by: Helm
      - isSubset:
          path: spec
          content:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/component: operator
                app.kubernetes.io/name: pxc-operator
                app.kubernetes.io/instance: unit
                app.kubernetes.io/part-of: pxc-operator
            strategy:
              rollingUpdate:
                maxUnavailable: 1
              type: RollingUpdate
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: operator
                  app.kubernetes.io/name: pxc-operator
                  app.kubernetes.io/instance: unit
                  app.kubernetes.io/part-of: pxc-operator
              spec:
                serviceAccountName: unit-pxc-operator
                terminationGracePeriodSeconds: 600
                containers:
                  - name: percona-xtradb-cluster-operator
                    image: percona/percona-xtradb-cluster-operator:1.20.0
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 8080
                        name: metrics
                        protocol: TCP
                    command:
                      - percona-xtradb-cluster-operator
                    env:
                      - name: WATCH_NAMESPACE
                        value: test-ns
                      - name: POD_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.name
                      - name: OPERATOR_NAME
                        value: unit-pxc-operator
                      - name: LOG_STRUCTURED
                        value: "false"
                      - name: LOG_LEVEL
                        value: INFO
                      - name: DISABLE_TELEMETRY
                        value: "false"
                      - name: MAX_CONCURRENT_RECONCILES
                        value: "1"
                      - name: S3_WORKERS_LIMIT
                        value: "10"
                      - name: PXCO_FEATURE_GATES
                        value: XtrabackupSidecar=false
                      - name: PXCO_LEADER_ELECTION_ENABLED
                        value: "true"
                      - name: PXCO_LEADER_ELECTION_LEASE_NAME
                        value: ""
                      - name: PXCO_LEADER_ELECTION_LEASE_DURATION
                        value: 60s
                      - name: PXCO_LEADER_ELECTION_RENEW_DEADLINE
                        value: 40s
                      - name: PXCO_LEADER_ELECTION_RETRY_PERIOD
                        value: 10s
                    livenessProbe:
                      failureThreshold: 3
                      httpGet:
                        path: /metrics
                        port: metrics
                        scheme: HTTP
                    resources:
                      limits:
                        cpu: 200m
                        memory: 500Mi
                      requests:
                        cpu: 100m
                        memory: 20Mi

  - it: renders changed default deployment values
    values:
      - values/deployment-changed-defaults.yaml
    asserts:
    - equal:
        path: spec.template.spec.containers[0]
        value:
          name: percona-xtradb-cluster-operator
          image: operator:dummy
          imagePullPolicy: Always
          command:
            - percona-xtradb-cluster-operator
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /metrics
              port: metrics
              scheme: HTTP
          resources:
            limits:
              cpu: 2m
              memory: 2Mi
            requests:
              cpu: 1m
              memory: 1Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmpdir
          env:
            - name: WATCH_NAMESPACE
              value: test-ns
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: unit-pxc-operator
            - name: LOG_STRUCTURED
              value: "true"
            - name: LOG_LEVEL
              value: DEBUG
            - name: DISABLE_TELEMETRY
              value: "true"
            - name: MAX_CONCURRENT_RECONCILES
              value: "2"
            - name: S3_WORKERS_LIMIT
              value: "3"
            - name: PXCO_FEATURE_GATES
              value: XtrabackupSidecar=true
            - name: PXCO_LEADER_ELECTION_ENABLED
              value: "false"
            - name: PXCO_LEADER_ELECTION_LEASE_NAME
              value: lease
            - name: PXCO_LEADER_ELECTION_LEASE_DURATION
              value: 10s
            - name: PXCO_LEADER_ELECTION_RENEW_DEADLINE
              value: 5s
            - name: PXCO_LEADER_ELECTION_RETRY_PERIOD
              value: 2s
            - name: HTTP_PROXY
              value: proxy

  - it: renders a service and empty watch namespace for cluster-wide mode
    set:
      watchAllNamespaces: true
    asserts:
      - hasDocuments:
          count: 2
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WATCH_NAMESPACE
            value: ""
        documentIndex: 0
      - isKind:
          of: Service
        documentIndex: 1
      - equal:
          path: metadata.name
          value: percona-xtradb-cluster-operator
        documentIndex: 1
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/name: pxc-operator
        documentIndex: 1

  - it: renders a service when a specific watch namespace is configured
    set:
      watchNamespace: watch-ns
    asserts:
      - hasDocuments:
          count: 2
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WATCH_NAMESPACE
            value: watch-ns
        documentIndex: 0
      - isKind:
          of: Service
        documentIndex: 1

  - it: renders a custom operator image when defined
    set:
      image: custom-operator:9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom-operator:9.9.9

  - it: renders image pull secrets when defined
    set:
      imagePullSecrets:
        - name: registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: registry-secret

  - it: renders pod annotations when defined
    set:
      podAnnotations:
        test: value
    asserts:
      - equal:
          path: spec.template.metadata.annotations
          value:
            test: value

  - it: renders container security context and tmp volume when read-only root filesystem is enabled
    set:
      containerSecurityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: tmpdir
              mountPath: /tmp
      - equal:
          path: spec.template.spec.volumes
          value:
            - name: tmpdir
              emptyDir: {}

  - it: renders custom resources when defined
    set:
      resources:
        requests:
          cpu: 200m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            requests:
              cpu: 200m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 1Gi

  - it: renders scheduling options when defined
    set:
      nodeSelector:
        disktype: ssd
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: dedicated
          operator: Equal
          value: operators
          effect: NoSchedule
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            disktype: ssd
      - equal:
          path: spec.template.spec.affinity
          value:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 1
                  podAffinityTerm:
                    topologyKey: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: dedicated
              operator: Equal
              value: operators
              effect: NoSchedule

  - it: renders extra environment variables when defined
    set:
      extraEnvVars:
        - name: http_proxy
          value: example-proxy-http
        - name: https_proxy
          value: example-proxy-https
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: http_proxy
            value: example-proxy-http
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: https_proxy
            value: example-proxy-https

  - it: renders logging, telemetry and worker options when defined
    set:
      logStructured: true
      logLevel: DEBUG
      disableTelemetry: true
      maxConcurrentReconciles: 3
      s3WorkersLimit: 20
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_STRUCTURED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: DEBUG
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISABLE_TELEMETRY
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CONCURRENT_RECONCILES
            value: "3"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: S3_WORKERS_LIMIT
            value: "20"

  - it: renders feature gates when defined
    set:
      featureGates:
        xtrabackupSidecar: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_FEATURE_GATES
            value: XtrabackupSidecar=true

  - it: renders leader election options when defined
    set:
      leaderElectionEnabled: false
      leaseName: custom-lease
      leaseDuration: 90s
      renewDeadline: 60s
      retryPeriod: 20s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_LEADER_ELECTION_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_LEADER_ELECTION_LEASE_NAME
            value: custom-lease
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_LEADER_ELECTION_LEASE_DURATION
            value: 90s
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_LEADER_ELECTION_RENEW_DEADLINE
            value: 60s
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PXCO_LEADER_ELECTION_RETRY_PERIOD
            value: 20s
