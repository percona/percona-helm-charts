{{- $serviceType := .Values.service.type -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  {{- include "pmm.includeNamespace" . | nindent 2 }}
  labels:
    {{- include "pmm.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  {{- with .Values.service.finalizers }}
  finalizers:
    {{- toYaml . | nindent 8 }}
  {{- end }}
spec:
  type: {{ $serviceType | default "ClusterIP" }}
  {{- with .Values.service.ports }}
  ports:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  selector:
    {{- include "pmm.selectorLabels" . | nindent 4 }}
{{- if .Values.ingress.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}-grpc
  {{- include "pmm.includeNamespace" . | nindent 2 }}
  labels:
    {{- include "pmm.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  {{- with .Values.service.finalizers }}
  finalizers:
    {{- toYaml . | nindent 8 }}
  {{- end }}
spec:
  # The gRPC service is only consumed internally as an Ingress backend, so it is
  # always ClusterIP. Inheriting the main service type (e.g. NodePort) would make
  # both services request the same nodePort values and fail to deploy.
  type: ClusterIP
  {{- with .Values.service.ports }}
  ports:
    {{- range . }}
    {{- toYaml (list (omit . "nodePort")) | nindent 8 }}
    {{- end }}
  {{- end }}
  selector:
    {{- include "pmm.selectorLabels" . | nindent 4 }}
---
{{- end }}
