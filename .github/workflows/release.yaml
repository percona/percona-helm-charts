name: Release Charts

on:
  push:
    path-ignore:
      - 'charts/gcp-marketplace/**'
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # needed for ghcr access
      id-token: write # needed for keyless signing
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.21.0

      - name: Add Helm repositories
        run: |
          helm repo add haproxytech https://haproxytech.github.io/helm-charts/
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add victoriametrics https://victoriametrics.github.io/helm-charts/
          helm repo add altinity https://helm.altinity.com
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm repo update

      - name: Build chart dependencies
        run: |
          helm dependency build charts/pmm-ha-dependencies
          helm dependency build charts/pmm-ha

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          skip_existing: true

      # see https://github.com/helm/chart-releaser/issues/183
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          repo="oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/percona-helm-charts"
          failed=()
          for pkg in .cr-release-packages/*.tgz; do
            pushed=false
            for attempt in 1 2 3; do
              if helm push "${pkg}" "${repo}"; then
                pushed=true
                break
              fi
              echo "::warning::helm push ${pkg} failed (attempt ${attempt}/3)"
              sleep $((attempt * 5))
            done
            "${pushed}" || failed+=("${pkg}")
          done
          if [ "${#failed[@]}" -ne 0 ]; then
            echo "::error::failed to push ${#failed[@]} chart(s): ${failed[*]}"
            exit 1
          fi
